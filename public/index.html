<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        /* padding: 40px 20px; */
        background: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        color: #e8e8e8;
        min-height: 80vh;
      }

      h1 {
        text-align: center;
        font-size: 2.5rem;
        font-weight: 600;
        margin-bottom: 30px;
        color: #fff;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      }

      #container {
        max-width: 1500px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 12px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      input[type="checkbox"] {
        width: 24px;
        height: 24px;
        cursor: pointer;
        accent-color: #4cc9f0;
        transition:
          transform 0.2s ease,
          accent-color 0.2s ease;
      }

      input[type="checkbox"]:hover {
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <h1>Sockets and Rate Limiting</h1>
    <div id="container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();

      // socket.io Event Listener
      socket.on("server:checkbox:change", (data) => {
        console.log(
          "frontend received checkbox change event from server:",
          data,
        );
        const { checked, index } = data;
        console.log("Updating checkbox state on frontend...", {
          index,
          checked,
        });

        const checkBox = document.getElementById(`checkbox-${index}`);
        if (checkBox) {
          checkBox.checked = checked;
        }
      });

      // Dynamically create checkboxes and add event listeners
      window.addEventListener("load", async () => {
        const res = await fetch("/checkboxes", { method: "GET" });
        const data = await res.json();

        if (data && data?.checkboxes) {
          data?.checkboxes.forEach((serverValue, index) => {
            // Create checkbox element
            const input = document.createElement("input");
            input.type = "checkbox";
            input.id = `checkbox-${index}`;

            input.checked = serverValue;

            // Add event listener
            input.addEventListener("change", (event) => {
              const checked = event.target.checked;
              socket.emit("client:checkbox:change", {
                index,
                checked,
              });
            });
            //
            container.appendChild(input);
          });
        }
      });

      const container = document.getElementById("container");
      const CHECKBOX_COUNT = 100;
    </script>
  </body>
</html>
